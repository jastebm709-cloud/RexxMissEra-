<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REXX STORE - ANTI REDUP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(ellipse at top, #1e3a8a 0%, #0f172a 50%, #000 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
        radial-gradient(circle at 20% 30%, rgba(0,255,136,0.2) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0,204,255,0.2) 0%, transparent 50%);
    animation: float 8s ease-in-out infinite;
    z-index: -1;
}
@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
}

/* Marquee jalan */
.marquee {
    position: absolute;
    top: 15px;
    width: 100%;
    background: rgba(0,255,136,0.1);
    border-top: 1px solid #00ff88;
    border-bottom: 1px solid #00ff88;
    padding: 8px 0;
    overflow: hidden;
    font-size: 12px;
    color: #00ff88;
}
.marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 15s linear infinite;
    white-space: nowrap;
}
@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

.container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 25px;
    padding: 40px 30px;
    box-shadow: 0 8px 32px 0 rgba(0, 255, 136, 0.2);
    text-align: center;
    max-width: 400px;
    width: 100%;
    animation: fadeIn 1s ease;
    margin-top: 40px;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.logo {
    font-size: 60px;
    font-weight: 800;
    background: linear-gradient(90deg, #00ff88, #00ccff, #8a2be2, #00ff88);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 25px #00ff88);
    animation: gradientShift 3s ease infinite;
    letter-spacing: 3px;
    margin-bottom: 5px;
}
@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.sub { color: #aaa; font-size: 13px; margin-bottom: 15px; }

/* Stats counter */
.stats {
    display: flex;
    justify-content: space-around;
    margin: 20px 0;
    padding: 15px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
}
.stat h3 { 
    color: #00ff88; 
    font-size: 20px; 
    font-weight: 800;
}
.stat p { 
    color: #aaa; 
    font-size: 11px; 
    margin-top: 3px;
}

.btn {
    display: block;
    width: 100%;
    padding: 15px;
    margin: 12px 0;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 15px;
    color: white;
    font-weight: 700;
    font-size: 15px;
    text-decoration: none;
    transition: all 0.3s ease;
    cursor: pointer;
}
.btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
    border-color: #00ff88;
}
.btn.wa {
    background: linear-gradient(90deg, #00ff88, #00ccff);
    color: #000;
    font-weight: 800;
}

.footer {
    margin-top: 30px;
    color: #555;
    font-size: 11px;
    text-align: center;
}
#clock { color: #00ccff; font-weight: 600; }
</style>
</head>
<body>

<!-- Marquee rame -->
<div class="marquee">
  <span>🔥 REXX STORE BUKA 24 JAM • STOK AMAN • GARANSI 1 BULAN • JOIN GRUP BUAT INFO RESTOK 🔥</span>
</div>

<div class="container">
  <h1 class="logo">REXX</h1>
  <p class="sub">ANTI REDUP 🔥</p>

  <!-- Stats biar rame -->
  <div class="stats">
    <div class="stat">
      <h3 id="stok">247</h3>
      <p>Stok Akun</p>
    </div>
    <div class="stat">
      <h3 id="buyer">1.2K</h3>
      <p>Buyer Puas</p>
    </div>
    <div class="stat">
      <h3 id="online">89</h3>
      <p>Online</p>
    </div>
  </div>

  <p style="color:#ccc; font-size:12px; margin-bottom:20px;">Jam Server: <span id="clock">00:00:00</span></p>

  <a href="#" class="btn">MASUK GRUP JB 🔥</a>
  <a href="#" class="btn">IKUTI SALURAN 📢</a>
  <a href="#" class="btn wa">CHAT ADMIN WA 💬</a>

  <div class="footer">
    © 2026 REXX STORE • Terpercaya Se-Indonesia
  </div>
</div>

<script>
// Jam live
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('id-ID');
}
setInterval(updateClock, 1000);
updateClock();

// Counter stok animasi naik turun biar rame
setInterval(() => {
  document.getElementById('stok').textContent = Math.floor(Math.random() * 50) + 220;
  document.getElementById('online').textContent = Math.floor(Math.random() * 40) + 70;
}, 3000);
</script>

</body>
</html>
